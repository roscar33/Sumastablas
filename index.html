<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estrellas Matemáticas - Sede Santa Juana 🌟</title>
    <style>
        :root {
            --azul-inicio: #4facfe;
            --azul-medio: #00f2fe;
            --amarillo-final: #f9d423;
            --primario: #2575fc;
            --exito: #66bb6a;
            --error: #ef5350;
            --blanco: #ffffff;
        }

        /* Estilos Generales - Sin cursivas */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-style: normal !important; /* Forzar que nada sea cursiva */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, var(--azul-inicio) 0%, var(--azul-medio) 50%, var(--amarillo-final) 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #contenedor-app {
            width: 94%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 35px 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            border: 6px solid var(--blanco);
        }

        /* Pantallas */
        .pantalla { display: none; flex-direction: column; align-items: center; animation: aparecer 0.4s ease-out; }
        .pantalla.activa { display: flex; }

        @keyframes aparecer { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { color: var(--primario); font-size: 1.8rem; margin: 10px 0 20px 0; font-weight: 800; text-transform: uppercase; }
        .instruccion { color: #555; font-size: 1.1rem; margin-bottom: 25px; line-height: 1.4; }

        /* Formulario de Ingreso */
        input {
            width: 100%;
            padding: 20px;
            border-radius: 25px;
            border: 3px solid #eee;
            font-size: 1.4rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primario); }

        .btn-accion {
            background: var(--primario);
            color: white;
            border: none;
            padding: 20px 30px;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #1a56c5;
            width: 100%;
            transition: all 0.1s;
        }
        .btn-accion:active { transform: translateY(4px); box-shadow: 0 4px 0 #1a56c5; }
        .btn-accion:disabled { background: #999; box-shadow: 0 8px 0 #777; cursor: not-allowed; }

        /* HUD del Juego */
        .marcador {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 15px;
            font-weight: 800;
        }
        .etiqueta { background: #f0f7ff; color: var(--primario); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; }
        .estrellas-texto { color: #f57c00; font-size: 1.2rem; }

        .barra-tiempo {
            width: 100%;
            height: 16px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 2px solid #fff;
        }
        #progreso-tiempo {
            width: 100%;
            height: 100%;
            background: var(--primario);
            transition: width 1s linear;
        }

        .operacion {
            font-size: 5.5rem;
            font-weight: 900;
            color: #333;
            margin: 10px 0;
            text-shadow: 2px 2px 0 white;
        }

        .cuadricula-opciones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }
        .btn-opcion {
            background: white;
            border: 4px solid #f0f0f0;
            border-radius: 30px;
            padding: 25px 5px;
            font-size: 2.8rem;
            font-weight: bold;
            color: #444;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #ddd;
        }
        .btn-opcion.correcto { background: var(--exito) !important; color: white; border-color: #4caf50; box-shadow: 0 5px 0 #388e3c; }
        .btn-opcion.error { background: var(--error) !important; color: white; border-color: #f44336; box-shadow: 0 5px 0 #d32f2f; }

        #retroalimentacion { height: 40px; margin-top: 15px; font-weight: bold; font-size: 1.3rem; }

        #control-sonido {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 10;
        }

        /* Animaciones */
        .vibrar { animation: vibracion 0.4s; }
        @keyframes vibracion { 
            0%, 100% { transform: translateX(0); } 
            25%, 75% { transform: translateX(-10px); } 
            50% { transform: translateX(10px); } 
        }

        .cargando {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primario);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: girar 1s linear infinite;
            display: inline-block;
        }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="contenedor-app">
    <button id="control-sonido">🔊</button>

    <!-- PORTADA / INGRESO -->
    <div id="pantalla-inicio" class="pantalla activa">
        <div style="font-size: 5rem; margin-bottom: 10px;">🎒</div>
        <h1>SEDE SANTA JUANA</h1>
        <p class="instruccion">¡Hola amiguito!<br>Escribe tu número de documento para comenzar a ganar estrellas.</p>
        <input type="number" id="campo-documento" placeholder="Tu documento aquí">
        <button class="btn-accion" id="btn-entrar">
            <span id="texto-boton">¡ENTRAR A JUGAR! 🚀</span>
        </button>
    </div>

    <!-- JUEGO -->
    <div id="pantalla-juego" class="pantalla">
        <div class="marcador">
            <div class="etiqueta">Tabla del <span id="txt-tabla">0</span></div>
            <div class="estrellas-texto">✨ <span id="txt-estrellas">0.0</span></div>
            <div class="etiqueta">Paso <span id="txt-paso">1</span>/10</div>
        </div>
        <div class="barra-tiempo"><div id="progreso-tiempo"></div></div>
        <div id="saludo-nino" style="font-size: 1.2rem; color: #444; font-weight: 700; margin-bottom: 10px;"></div>
        <div class="operacion" id="visual-operacion">0 + 0</div>
        <div class="cuadricula-opciones" id="grid-respuestas"></div>
        <div id="retroalimentacion"></div>
    </div>

    <!-- FINAL / RESULTADOS -->
    <div id="pantalla-final" class="pantalla">
        <div style="font-size: 6rem;" id="emoji-final">🏆</div>
        <h1 id="titulo-final">¡MUY BIEN!</h1>
        <p id="resumen-final" style="font-size: 1.3rem; color: #333; margin-bottom: 20px;"></p>
        <div id="estado-guardado" style="font-size: 0.9rem; color: #777; margin-bottom: 25px; min-height: 20px;"></div>
        <button class="btn-accion" id="btn-continuar">SIGUIENTE NIVEL ➡️</button>
        <button class="btn-accion" id="btn-salir" style="margin-top: 15px; background: #888; box-shadow: 0 8px 0 #555;">SALIR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB8BZNYGCSHTZuGir8wIBArqdI8PpXffBA",
        authDomain: "juegosymas-ad2b3.firebaseapp.com",
        projectId: "juegosymas-ad2b3",
        storageBucket: "juegosymas-ad2b3.firebasestorage.app",
        messagingSenderId: "363026419869",
        appId: "1:363026419869:web:0a7ae4cb6b0a30050a0474"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = 'santa-juana-sumas-final-v1';

    const LISTA_ESTUDIANTES = {
        "1072265248": "MELANIN PATRICIA FLOREZ POLO",
        "1041636870": "MARIA JOSE GONZALEZ BETANCUR",
        "1042155380": "JOSE LEANDRO GUTIERREZ CHAVARRIA",
        "1041636641": "SEBASTIAN MARTINEZ MARTINEZ",
        "1041636841": "LUCIANA VARELAS BARRIENTOS"
    };

    const estado = {
        nino: null,
        tablaActual: 0,
        pasoActual: 0,
        pasosAleatorios: [],
        estrellas: 0.0,
        segundos: 25,
        relojId: null,
        sonidoActivo: true,
        bloqueado: false
    };

    // Autenticación inicial
    signInAnonymously(auth).catch(err => console.error("Error Auth:", err));

    const UI = {
        inicio: document.getElementById('pantalla-inicio'),
        juego: document.getElementById('pantalla-juego'),
        final: document.getElementById('pantalla-final'),
        btnEntrar: document.getElementById('btn-entrar'),
        txtBoton: document.getElementById('texto-boton'),
        inputDoc: document.getElementById('campo-documento')
    };

    UI.btnEntrar.onclick = iniciarSesion;
    document.getElementById('control-sonido').onclick = () => {
        estado.sonidoActivo = !estado.sonidoActivo;
        document.getElementById('control-sonido').innerText = estado.sonidoActivo ? '🔊' : '🔈';
    };
    document.getElementById('btn-salir').onclick = () => location.reload();
    document.getElementById('btn-continuar').onclick = () => {
        estado.tablaActual = (estado.tablaActual + 1) % 10;
        comenzarReto();
    };

    async function iniciarSesion() {
        const id = UI.inputDoc.value.trim();
        if (!LISTA_ESTUDIANTES[id]) {
            alert("¡Ups! Ese número no está en la lista. Pide ayuda a tu profesor.");
            return;
        }

        UI.txtBoton.innerHTML = `<span class="cargando"></span> Buscando tus estrellas...`;
        UI.btnEntrar.disabled = true;

        estado.nino = { id: id, nombre: LISTA_ESTUDIANTES[id] };

        try {
            // Regla 1: Ruta absoluta. Colección: SUMASTABLAS
            const ruta = collection(db, 'artifacts', appId, 'public', 'data', 'SUMASTABLAS');
            const snapshot = await getDocs(ruta);
            
            let tablaMasAlta = -1;
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.documento === estado.nino.id) {
                    if (data.tabla > tablaMasAlta) tablaMasAlta = data.tabla;
                }
            });

            // Lógica de Persistencia: Siguiente tabla a la completada
            estado.tablaActual = tablaMasAlta === -1 ? 0 : (tablaMasAlta + 1);
            if (estado.tablaActual > 9) estado.tablaActual = 0;
            
            comenzarReto();
        } catch (e) {
            console.error("Falla al conectar:", e);
            estado.tablaActual = 0; // Si falla, que juegue desde el inicio
            comenzarReto();
        }
    }

    function comenzarReto() {
        estado.pasoActual = 0;
        estado.estrellas = 0;
        estado.pasosAleatorios = Array.from({length: 10}, (_, i) => i).sort(() => Math.random() - 0.5);
        
        UI.inicio.classList.remove('activa');
        UI.final.classList.remove('activa');
        UI.juego.classList.add('activa');
        
        document.getElementById('saludo-nino').innerText = `¡Bienvenido, ${estado.nino.nombre.split(' ')[0]}! ✨`;
        mostrarPregunta();
    }

    function mostrarPregunta() {
        estado.bloqueado = false;
        estado.segundos = 25;
        actualizarBarraTiempo();
        iniciarContador();

        const t = estado.tablaActual;
        const s = estado.pasosAleatorios[estado.pasoActual];
        const correcta = t + s;

        document.getElementById('txt-tabla').innerText = t;
        document.getElementById('txt-paso').innerText = estado.pasoActual + 1;
        document.getElementById('txt-estrellas').innerText = estado.estrellas.toFixed(1);
        document.getElementById('visual-operacion').innerText = `${t} + ${s}`;
        document.getElementById('retroalimentacion').innerText = "";

        let opciones = [correcta];
        while(opciones.length < 4) {
            let azar = correcta + (Math.floor(Math.random() * 5) - 2);
            if(azar < 0 || opciones.includes(azar)) azar = correcta + (opciones.length + 3);
            if(!opciones.includes(azar)) opciones.push(azar);
        }
        opciones.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('grid-respuestas');
        grid.innerHTML = '';
        opciones.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-opcion';
            b.innerText = o;
            b.onclick = () => procesarEleccion(o, b, correcta);
            grid.appendChild(b);
        });
    }

    function iniciarContador() {
        clearInterval(estado.relojId);
        estado.relojId = setInterval(() => {
            estado.segundos--;
            actualizarBarraTiempo();
            if(estado.segundos <= 0) {
                clearInterval(estado.relojId);
                if(!estado.bloqueado) procesarEleccion(null, null, null, true);
            }
        }, 1000);
    }

    function actualizarBarraTiempo() {
        const barra = document.getElementById('progreso-tiempo');
        const porcentaje = (estado.segundos / 25) * 100;
        barra.style.width = porcentaje + "%";
        barra.style.background = estado.segundos < 8 ? 'var(--error)' : 'var(--primario)';
    }

    function procesarEleccion(valor, boton, correcta, esTiempo = false) {
        if(estado.bloqueado) return;
        estado.bloqueado = true;
        clearInterval(estado.relojId);

        const fb = document.getElementById('retroalimentacion');

        if (!esTiempo && valor === correcta) {
            estado.estrellas += 0.5;
            boton.classList.add('correcto');
            fb.innerText = "¡EXCELENTE! +0.5 Estrellas ✨";
            fb.style.color = "var(--exito)";
            emitirSonido(600, 0.1);
            lanzarConfeti();
        } else {
            if(boton) boton.classList.add('error');
            fb.innerText = esTiempo ? "¡TIEMPO AGOTADO! ⏰" : "¡INTÉNTALO OTRA VEZ! 💪";
            fb.style.color = "var(--error)";
            document.getElementById('contenedor-app').classList.add('vibrar');
            setTimeout(() => document.getElementById('contenedor-app').classList.remove('vibrar'), 400);
            emitirSonido(200, 0.2);
        }

        setTimeout(() => {
            estado.pasoActual++;
            if(estado.pasoActual < 10) mostrarPregunta();
            else terminarNivel();
        }, 1500);
    }

    async function terminarNivel() {
        UI.juego.classList.remove('activa');
        UI.final.classList.add('activa');
        
        const puntosFinales = estado.estrellas.toFixed(1);
        document.getElementById('emoji-final').innerText = estado.estrellas >= 4 ? "🏆" : "🌟";
        document.getElementById('titulo-final').innerText = `¡BRAVO, ${estado.nino.nombre.split(' ')[0]}!`;
        document.getElementById('resumen-final').innerText = `Ganaste ${puntosFinales} Estrellas en la Tabla del ${estado.tablaActual}.`;
        
        const txtStatus = document.getElementById('estado-guardado');
        txtStatus.innerText = "💾 Guardando tus estrellas...";

        try {
            // Regla 1: Colección obligatoria SUMASTABLAS
            const ruta = collection(db, 'artifacts', appId, 'public', 'data', 'SUMASTABLAS');
            await addDoc(ruta, {
                estudiante: estado.nino.nombre,
                documento: estado.nino.id,
                estrellas: estado.estrellas,
                tabla: estado.tablaActual,
                fecha: new Date(),
                sede: "Santa Juana"
            });
            txtStatus.innerText = "✅ ¡Estrellas guardadas con éxito!";
        } catch (e) {
            console.error(e);
            txtStatus.innerText = "⚠️ No pudimos guardar, ¡pero lo hiciste muy bien!";
        }
    }

    function emitirSonido(f, d) {
        if(!estado.sonidoActivo) return;
        try {
            const c = new (window.AudioContext || window.webkitAudioContext)();
            const o = c.createOscillator();
            const g = c.createGain();
            o.frequency.value = f;
            o.connect(g);
            g.connect(c.destination);
            o.start();
            g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + d);
            o.stop(c.currentTime + d);
        } catch(e) {}
    }

    function lanzarConfeti() {
        for(let i=0; i<15; i++) {
            const p = document.createElement('div');
            p.style.position = 'absolute';
            p.style.width = '12px'; p.style.height = '12px';
            p.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 60%)`;
            p.style.borderRadius = '50%';
            p.style.left = '50%'; p.style.top = '50%';
            p.style.pointerEvents = 'none';
            document.body.appendChild(p);
            p.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*400}px, ${(Math.random()-0.5)*400}px) scale(0)`, opacity: 0 }
            ], { duration: 1000 }).onfinish = () => p.remove();
        }
    }
</script>

</body>
</html>
